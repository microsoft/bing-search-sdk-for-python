name: Pylint

on:
  push:
    branches:
      - v-ghajam/CI-CD-Linter
  pull_request:
    branches:
      - v-ghajam/CI-CD-Linter

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -r ./requirements.txt
    - name: Analysing the code with pylint
      run: |
        # Sample files are intended as quickstarts for clients
        # That's why they are self-contained
        # I.e., they don't import code from other files
        # I.e., they must have duplicate parts!
        # So, ignoring this warning
        pylint --disable duplicate-code $(git ls-files './samples/rest/*.py')
        pylint $(git ls-files './tests/rest/test_*.py')
